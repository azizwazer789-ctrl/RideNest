<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RideNest - Fleet Reviews</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#b4c5ff",

                        "secondary-fixed-dim": "#bec6e0",

                        "surface-container-lowest": "#ffffff",

                    "spacing": {
                        "stack-sm": "8px",
                        "stack-md": "16px",
                        "gutter": "24px",
                        "container-padding-mobile": "16px",
                        "stack-lg": "24px",
                        "container-padding": "32px",
                        "base": "8px",
                        "sidebar-width": "260px"
                    },
                    "fontFamily": {
                        "display-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "title-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-sm": ["Inter"],
                        "label-caps": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .star-filled { font-variation-settings: 'FILL' 1; color: #EAB308; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-background text-on-surface flex min-h-screen">
<!-- SideNavBar (Shared Component) -->
<aside class="fixed left-0 top-0 h-screen w-[260px] bg-surface dark:bg-inverse-surface border-r border-outline-variant dark:border-outline flex flex-col h-full py-stack-lg z-50">
<div class="px-6 mb-10">
<h1 class="font-display-lg text-display-lg font-bold text-primary dark:text-primary-fixed-dim tracking-tight">RideNest</h1>
<p class="text-on-surface-variant opacity-70 font-label-caps text-[10px]">Fleet Management</p>
</div>
<nav class="flex-1 space-y-1">
<a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant dark:text-surface-variant hover:bg-surface-container dark:hover:bg-surface-variant transition-colors group" href="#">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-body-md text-body-md">Dashboard</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant dark:text-surface-variant hover:bg-surface-container dark:hover:bg-surface-variant transition-colors" href="#">
<span class="material-symbols-outlined">directions_car</span>
<span class="font-body-md text-body-md">My Vehicles</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant dark:text-surface-variant hover:bg-surface-container dark:hover:bg-surface-variant transition-colors" href="#">
<span class="material-symbols-outlined">event_note</span>
<span class="font-body-md text-body-md">Bookings</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant dark:text-surface-variant hover:bg-surface-container dark:hover:bg-surface-variant transition-colors" href="#">
<span class="material-symbols-outlined">chat</span>
<span class="font-body-md text-body-md">Messages</span>
</a>
<!-- Active State Logic: Reviews -->
<a class="flex items-center gap-3 px-4 py-3 text-primary dark:text-primary-fixed-dim bg-primary-container/10 dark:bg-primary-container/20 border-l-4 border-primary dark:border-primary-fixed-dim font-bold active:scale-[0.98] transition-all" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="font-body-md text-body-md">Reviews</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant dark:text-surface-variant hover:bg-surface-container dark:hover:bg-surface-variant transition-colors" href="#">
<span class="material-symbols-outlined">payments</span>
<span class="font-body-md text-body-md">Earnings</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant dark:text-surface-variant hover:bg-surface-container dark:hover:bg-surface-variant transition-colors" href="#">
<span class="material-symbols-outlined">analytics</span>
<span class="font-body-md text-body-md">Analytics</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant dark:text-surface-variant hover:bg-surface-container dark:hover:bg-surface-variant transition-colors" href="#">
<span class="material-symbols-outlined">calendar_today</span>
<span class="font-body-md text-body-md">Calendar</span>
</a>
</nav>
<div class="mt-auto px-4 space-y-1">
<a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant dark:text-surface-variant hover:bg-surface-container dark:hover:bg-surface-variant transition-colors rounded-lg" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="font-body-md text-body-md">Settings</span>
</a>
<button class="w-full flex items-center gap-3 px-4 py-3 text-error hover:bg-error-container/10 transition-colors rounded-lg">
<span class="material-symbols-outlined">logout</span>
<span class="font-body-md text-body-md">Logout</span>
</button>
</div>
</aside>
<!-- Main Content Area -->
<main class="flex-1 ml-[260px] min-h-screen">
<!-- TopNavBar (Shared Component) -->
<header class="fixed top-0 right-0 w-[calc(100%-260px)] h-16 bg-surface border-b border-outline-variant z-40 flex justify-between items-center px-container-padding">
<div class="flex items-center gap-4 w-1/3">
<div class="relative w-full max-w-sm">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl">search</span>
<input class="w-full pl-10 pr-4 py-2 bg-surface-container-low border border-outline-variant rounded-full text-body-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="Search reviews..." type="text"/>
</div>
</div>
<div class="flex items-center gap-4">
<button class="hover:bg-surface-container-low rounded-full p-2 transition-all relative">
<span class="material-symbols-outlined text-on-surface-variant">notifications</span>
</button></div></header></main></body></html>
